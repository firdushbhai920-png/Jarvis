<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS BOSS: FIRDUSH BHAI</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .arc-reactor { width: 150px; height: 150px; border: 5px solid #00d4ff; border-radius: 50%; box-shadow: 0 0 30px #00d4ff, inset 0 0 20px #00d4ff; animation: pulse 2s infinite; margin: 20px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        h1 { text-shadow: 0 0 10px #00d4ff; font-size: 24px; text-transform: uppercase; }
        .status { color: #fff; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <h1>बॉस: फ़िरदौस भाई</h1>
    <div class="arc-reactor"></div>
    <div class="status" id="st">सिस्टम ऑनलाइन... आपकी आवाज़ का इंतज़ार है</div>
    <script src="script.js"></script>
</body>
</html>
