<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS BOSS</title>
    <style>
        body { background: #000; color: #00d2ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .arc-reactor { width: 200px; height: 200px; border: 5px solid #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px #00d2ff; position: relative; }
        .core { width: 60px; height: 60px; background: white; border-radius: 50%; box-shadow: 0 0 30px white; }
        #st { margin-top: 30px; font-size: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="arc-reactor" onclick="powerUp()">
        <div class="core"></div>
    </div>
    <div id="st">सिस्टम ऑफलाइन <br> टच करें</div>
    <script src="script.js"></script>
</body>
</html>
